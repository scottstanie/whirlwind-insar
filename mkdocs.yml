# whirlwind documentation site.
#
# Build:    uv run mkdocs build           # writes ./site/
# Serve:    uv run mkdocs serve           # http://127.0.0.1:8000/
#
# The mkdocs site is self-contained under docs/ (no symlinks). The README lives
# at the repo root for GitHub rendering; the site links out to it from
# docs/index.md. The reference pages (ALGORITHM.md, NISAR_SUMMARY.md,
# PERFORMANCE.md, ENV_VARS.md, ATBD-whirlwind.md) and figures/ are real files
# in docs/.

site_name: whirlwind
site_description: >-
  Rust-backed 2D phase unwrapper for InSAR.
site_author: Scott Staniewicz
repo_url: https://github.com/scottstanie/whirlwind-insar
repo_name: scottstanie/whirlwind-insar
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site
use_directory_urls: true

# `docs/requirements.txt` and `docs/comparison_to_dolphin.json` are auxiliary
# files mkdocs would otherwise copy into the site without referencing.
exclude_docs: |
  requirements.txt
  comparison_to_dolphin.json

nav:
  - Home: index.md
  - Algorithm: ALGORITHM.md
  - NISAR comparison: NISAR_SUMMARY.md
  - Bridging disconnected regions: BRIDGING.md
  - Tuning connected components: CONNCOMP_TUNING.md
  - Performance: PERFORMANCE.md
  - Environment variables: ENV_VARS.md
  - Deeper references:
      - Full ATBD: ATBD-whirlwind.md

theme:
  name: material
  palette:
    - media: '(prefers-color-scheme: light)'
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - toc.follow
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  # Render LaTeX from `pymdownx.arithmatex` via MathJax.
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/scottstanie/whirlwind-insar
