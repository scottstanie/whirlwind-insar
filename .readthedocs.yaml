# .readthedocs.yaml - Read the Docs configuration.
# https://docs.readthedocs.io/en/stable/config-file/v2.html
#
# This builds the mkdocs site (mkdocs.yml at repo root) on every push to a
# tracked branch. No Rust toolchain needed - the docs are pure markdown +
# embedded figures.

version: 2

mkdocs:
  configuration: mkdocs.yml

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

python:
  install:
    - requirements: docs/requirements.txt
