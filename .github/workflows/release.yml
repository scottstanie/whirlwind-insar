name: Release

# Builds abi3 wheels + sdist with maturin and publishes to PyPI on tag, and
# attaches prebuilt `whirlwind` CLI binaries to the GitHub Release (so non-Python
# users can grab a single executable - see the `cli-binaries` job).
#
# Triggers:
#   - push a tag matching v*  (e.g. v0.1.0)                    -> build + publish
#   - manual workflow_dispatch                                  -> build only (no publish)
#
# PyPI auth: trusted publishing (OIDC). Configure once at
#   https://pypi.org/manage/account/publishing/
# with:
#   PyPI project name: whirlwind-insar
#   Owner:             scottstanie
#   Repository:        whirlwind-insar
#   Workflow:          release.yml
#   Environment:       pypi
#
# pyproject.toml lives at the repo root (maturin build-backend); the Rust
# crate it points at lives at crates/whirlwind-py/. Because pyo3 is built
# with abi3-py311 we ship one wheel per (platform, arch) - not one per
# Python minor - which keeps the matrix small.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  linux:
    name: wheel / linux-${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: build wheels (manylinux)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto
          sccache: "true"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  musllinux:
    name: wheel / musllinux-${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: build wheels (musllinux)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: musllinux_1_2
          sccache: "true"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-musllinux-${{ matrix.target }}
          path: dist

  macos:
    name: wheel / macos-${{ matrix.target }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: build wheels (macos)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: "true"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist

  windows:
    name: wheel / windows-${{ matrix.target }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: ${{ matrix.target }}

      - name: build wheels (windows)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: "true"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.target }}
          path: dist

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  cli-binaries:
    name: cli binary / ${{ matrix.target }}
    # Attach prebuilt `whirlwind` CLI executables to the GitHub Release so
    # non-Python users (e.g. MATLAB) can download a single binary - no Python,
    # Rust, or Docker required. Tag pushes only; workflow_dispatch builds are
    # validated by CI.yml on every PR/push.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write   # create the GitHub Release and upload assets
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      # Builds `cargo build --release --bin whirlwind --target <triple>` (using
      # `cross` automatically for the linux aarch64 target), packages a
      # tar.gz/zip, generates a SHA-256 checksum, and uploads everything to the
      # Release for this tag (creating it if it does not exist yet).
      - name: build + upload CLI binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: whirlwind
          target: ${{ matrix.target }}
          archive: whirlwind-$tag-$target
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: publish to PyPI
    needs: [linux, musllinux, macos, windows, sdist]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/whirlwind-insar
    permissions:
      id-token: write   # required for PyPI trusted publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: list artifacts
        run: ls -lah dist

      - name: publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
