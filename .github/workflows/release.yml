name: Release

# Builds abi3 wheels + sdist with maturin and publishes to PyPI on tag, and
# attaches prebuilt `whirlwind` CLI binaries to the GitHub Release (so non-Python
# users can grab a single executable - see the `cli-binaries` job).
#
# Triggers:
#   - push a tag matching v*  (e.g. v0.1.0)                    -> build + publish
#   - workflow_dispatch on a v* tag ref                         -> build + publish
#     (how bump-version.yml triggers this: its GITHUB_TOKEN tag push cannot
#     fire the push trigger - GitHub suppresses workflows for events created
#     by GITHUB_TOKEN, except workflow_dispatch/repository_dispatch)
#   - manual workflow_dispatch on a branch                      -> build only (no publish)
#
# PyPI auth: trusted publishing (OIDC). Configure once at
#   https://pypi.org/manage/account/publishing/
# with:
#   PyPI project name: whirlwind-insar
#   Owner:             scottstanie
#   Repository:        whirlwind-insar
#   Workflow:          release.yml
#   Environment:       pypi
#
# pyproject.toml lives at the repo root (maturin build-backend); the Rust
# crate it points at lives at crates/whirlwind-py/. Because pyo3 is built
# with abi3-py311 we ship one wheel per (platform, arch) - not one per
# Python minor - which keeps the matrix small.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version-check:
    # A v* tag must match Cargo.toml ([workspace.package].version) - the single
    # version source maturin stamps into the wheels. A hand-pushed tag on an
    # unbumped commit would otherwise build wheels with the OLD version, which
    # `skip-existing` then silently refuses to publish (this happened with
    # v0.2.0: PyPI stayed at 0.1.0 while the run showed green). Cut releases
    # with the "Bump version" workflow instead - see RELEASING.md.
    name: tag matches Cargo.toml version
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: check tag == Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          cargo_ver=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          if [ "$tag" != "$cargo_ver" ]; then
            echo "::error::Tag v$tag does not match Cargo.toml version $cargo_ver. Use the 'Bump version' workflow (RELEASING.md) instead of hand-pushing tags."
            exit 1
          fi
          echo "Tag v$tag matches Cargo.toml"

  linux:
    name: wheel / linux-${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: build wheels (manylinux)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto
          sccache: "true"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  musllinux:
    name: wheel / musllinux-${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: build wheels (musllinux)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: musllinux_1_2
          sccache: "true"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-musllinux-${{ matrix.target }}
          path: dist

  macos:
    name: wheel / macos-${{ matrix.target }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: build wheels (macos)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: "true"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist

  windows:
    name: wheel / windows-${{ matrix.target }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: ${{ matrix.target }}

      - name: build wheels (windows)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: "true"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.target }}
          path: dist

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  create-release:
    # The binary-upload action below only uploads to an EXISTING GitHub
    # Release - it polls "release not found" until timeout otherwise (the
    # v0.2.0/v0.2.1 releases only worked when a release had been created in
    # the UI first). Create it from the tag up front; idempotent if it
    # already exists.
    name: create GitHub release
    needs: [version-check]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: create release if missing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" --generate-notes --verify-tag \
            || echo "release already exists"

  cli-binaries:
    name: cli binary / ${{ matrix.target }}
    # Attach prebuilt `whirlwind` CLI executables to the GitHub Release so
    # non-Python users (e.g. MATLAB) can download a single binary - no Python,
    # Rust, or Docker required. Tag refs only; branch workflow_dispatch builds
    # are validated by CI.yml on every PR/push.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [version-check, create-release]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write   # create the GitHub Release and upload assets
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      # Builds `cargo build --release --bin whirlwind --target <triple>` (using
      # `cross` automatically for the linux aarch64 target), packages a
      # tar.gz/zip, generates a SHA-256 checksum, and uploads everything to the
      # Release for this tag (created by the create-release job above).
      - name: build + upload CLI binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: whirlwind
          target: ${{ matrix.target }}
          archive: whirlwind-$tag-$target
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: publish to PyPI
    needs: [version-check, linux, musllinux, macos, windows, sdist]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/whirlwind-insar
    permissions:
      id-token: write   # required for PyPI trusted publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: list artifacts
        run: ls -lah dist

      - name: publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
