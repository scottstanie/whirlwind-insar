name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  rust:
    name: rust / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --all -- --check

      - name: cargo clippy
        if: matrix.os == 'ubuntu-latest'
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace --release

  python:
    name: python / ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: install build + test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install "maturin>=1.5,<2.0" "numpy>=1.21" pytest pytest-randomly

      # Build + install the extension into the job's Python. `maturin develop`
      # needs a virtualenv (setup-python doesn't provide one); `pip install .`
      # builds via maturin (PEP 517) straight into the interpreter - no venv.
      # (Debug profile is fine for the correctness tests; release.yml ships wheels.)
      - name: build + install whirlwind
        run: pip install .

      - name: pytest
        run: pytest python/tests -v
