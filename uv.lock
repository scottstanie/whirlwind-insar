    { name = "matplotlib" },
    { name = "snaphu" },
]
dev = [
    { name = "memory-profiler" },
    { name = "whirlwind-orig" },
]
docs = [
    { name = "mkdocs" },
    { name = "mkdocs-material" },
    { name = "pymdown-extensions" },
]
real-data = [
    { name = "rasterio", version = "1.4.4", source = { registry = "https://pypi.org/simple" }, marker = "python_full_version < '3.12'" },
    { name = "rasterio", version = "1.5.0", source = { registry = "https://pypi.org/simple" }, marker = "python_full_version >= '3.12'" },
]
test = [
    { name = "pytest" },
    { name = "pytest-randomly" },
]

[package.metadata]
requires-dist = [{ name = "numpy", specifier = ">=1.21" }]

[package.metadata.requires-dev]
bench = [
    { name = "kamui", specifier = ">=0.1.2" },
    { name = "matplotlib", specifier = ">=3.7" },
    { name = "snaphu", specifier = ">=0.4" },
]
dev = [
    { name = "memory-profiler", specifier = ">=0.61.0" },
    { name = "whirlwind-orig", directory = "../whirlwind" },
]
docs = [
    { name = "mkdocs", specifier = ">=1.6" },
    { name = "mkdocs-material", specifier = ">=9.5" },
    { name = "pymdown-extensions", specifier = ">=10" },
]
real-data = [{ name = "rasterio", specifier = ">=1.4.3" }]
test = [
    { name = "pytest", specifier = ">=8" },
    { name = "pytest-randomly", specifier = ">=3" },
]

[[package]]
name = "whirlwind-orig"
source = { directory = "../whirlwind" }
dependencies = [
    { name = "numpy" },
    { name = "scipy" },
]

[package.metadata]
requires-dist = [
    { name = "numpy", specifier = ">=1.21" },
    { name = "pre-commit", marker = "extra == 'dev'" },
    { name = "pytest", marker = "extra == 'test'", specifier = ">=6" },
    { name = "pytest-cov", marker = "extra == 'test'", specifier = ">=3" },
    { name = "scipy", specifier = ">=1.8" },
]
provides-extras = ["dev", "test"]
