# Top-level pyproject for uv-managed dev environment.
#
# The *published* package (`whirlwind-rs` on PyPI / via `maturin publish`) is
# built from crates/whirlwind-py/pyproject.toml. This file is **dev-only**:
# it lists the tools and test/bench dependencies, and `uv sync` builds the
# environment for working on the repo.
#
# Quick start:
#   uv sync                                 # create venv + install all groups
#   uv run maturin develop --release        # editable Rust build into the venv
#   uv run pytest python/tests              # run python tests
#   uv run python scripts/bench.py          # cross-library bench
#
# Pattern adapted from stac-utils/rustac's CONTRIBUTING.md.

[project]
name = "whirlwind-rs-dev"
version = "0.0.0"
description = "Dev environment for whirlwind-rs. The publishable package lives at crates/whirlwind-py/."
requires-python = ">=3.11"
dependencies = [
    "maturin>=1.5,<2.0",
    "numpy>=1.21",
    "rasterio>=1.4.3",
]

[dependency-groups]
test = [
    "pytest>=8",
    "pytest-randomly>=3",
]
bench = [
    # Cross-library comparison via `python scripts/bench.py`.
    # snaphu is the canonical reference unwrapper. kamui (PUMA) is optional
    # and tends to use 10+ GiB on >= 1024² scenes — skip with `--no-kamui`.
    "snaphu>=0.4",
    "kamui>=0.1.2",
    "matplotlib>=3.7",
]
real-data = [
    "rasterio>=1.3",
]
dev = [
    "memory-profiler>=0.61.0",
]
docs = [
    "mkdocs>=1.6",
    "mkdocs-material>=9.5",
    "pymdown-extensions>=10",
]

[tool.uv]
default-groups = ["test", "bench"]
